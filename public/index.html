<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Tienda - Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .dot {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    header span.sub {
      font-size: 12px;
      color: #888;
    }

    header .new-chat-btn {
      margin-left: auto;
      background: #444;
      border: none;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    header .new-chat-btn:hover {
      background: #555;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #6366f1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      align-self: flex-start;
      background: #262626;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .msg .checkout-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #22c55e;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      transition: background 0.2s;
    }

    .msg .checkout-btn:hover {
      background: #16a34a;
    }

    #typing {
      display: none;
      align-self: flex-start;
      padding: 10px 14px;
      background: #262626;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      font-size: 14px;
      color: #888;
    }

    #typing .dots span {
      animation: blink 1.4s infinite;
      font-size: 18px;
    }
    #typing .dots span:nth-child(2) { animation-delay: 0.2s; }
    #typing .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.2; }
      30% { opacity: 1; }
    }

    .input-bar {
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
    }

    .input-bar input {
      flex: 1;
      background: #262626;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-bar input:focus {
      border-color: #6366f1;
    }

    .input-bar input::placeholder {
      color: #666;
    }

    .input-bar input:disabled {
      opacity: 0.5;
    }

    .input-bar button {
      background: #6366f1;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-bar button:hover {
      background: #4f46e5;
    }

    .input-bar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <header>
    <div class="dot"></div>
    <h1>Mi Tienda</h1>
    <span class="sub">Asistente de compras</span>
    <button class="new-chat-btn" id="newChatBtn">Nueva conversación</button>
  </header>

  <div id="messages">
    <div class="msg bot">Hola, bienvenido a Mi Tienda. ¿En qué puedo ayudarte?</div>
    <div id="typing"><span class="dots"><span>.</span><span>.</span><span>.</span></span> Escribiendo</div>
  </div>

  <div class="input-bar">
    <input type="text" id="input" placeholder="Escribe un mensaje..." autocomplete="off" />
    <button id="send">Enviar</button>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const typingEl = document.getElementById("typing");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const newChatBtn = document.getElementById("newChatBtn");

    let sessionId = localStorage.getItem("sessionId");

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;

      if (role === "bot") {
        // Procesamos markdown de imágenes y checkouts
        const imageRegex = /!\[([^\]]*)\]\(([^)]+)\)/g;
        const parts = [];
        let lastIndex = 0;
        let match;

        // Encontrar todas las imágenes
        const imageMatches = [];
        while ((match = imageRegex.exec(text)) !== null) {
          imageMatches.push({
            alt: match[1],
            url: match[2],
            start: match.index,
            end: match.index + match[0].length,
          });
        }

        // Construir el contenido con imágenes y texto
        let html = "";
        let currentIndex = 0;

        // Procesar imágenes
        imageMatches.forEach((img) => {
          // Texto antes de la imagen
          if (currentIndex < img.start) {
            const textPart = text.substring(currentIndex, img.start);
            html += textPart.replace(/</g, "&lt;").replace(/>/g, "&gt;");
          }
          // Agregar imagen
          html += `<img src="${img.url}" alt="${img.alt}" style="max-width:200px; border-radius:8px; margin:4px 0; display:block;">`;
          currentIndex = img.end;
        });

        // Texto restante después de la última imagen
        if (currentIndex < text.length) {
          const remaining = text.substring(currentIndex);

          // Procesar checkout URLs en el texto restante
          const checkoutRegex = /(https?:\/\/[^\s]+)/g;
          const checkoutParts = remaining.split(checkoutRegex);

          for (const part of checkoutParts) {
            if (/^https?:\/\//.test(part)) {
              html += `<br><a class="checkout-btn" href="${part}" target="_blank" rel="noopener">Ir al checkout</a>`;
            } else if (part) {
              html += part.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            }
          }
        }

        div.innerHTML = html;
      } else {
        div.textContent = text;
      }

      messagesEl.insertBefore(div, typingEl);
      scrollToBottom();
    }

    function setLoading(loading) {
      typingEl.style.display = loading ? "block" : "none";
      inputEl.disabled = loading;
      sendBtn.disabled = loading;
      if (loading) scrollToBottom();
    }

    async function send() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = "";
      addMessage(message, "user");
      setLoading(true);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, message }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Server error");

        if (!sessionId) {
          sessionId = data.sessionId;
          localStorage.setItem("sessionId", sessionId);
        }

        addMessage(data.response, "bot");
      } catch (err) {
        addMessage("Error: no pude conectar con el servidor.", "bot");
        console.error(err);
      } finally {
        setLoading(false);
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // Nueva conversación: limpia sesión y reinicia el chat
    newChatBtn.addEventListener("click", () => {
      // Limpiar localStorage y sessionId
      localStorage.removeItem("sessionId");
      sessionId = null;

      // Limpiar mensajes del DOM (excepto el mensaje de bienvenida)
      while (messagesEl.children.length > 2) {
        messagesEl.removeChild(messagesEl.lastChild);
      }

      // Limpiar input y enfocar
      inputEl.value = "";
      inputEl.focus();
    });

    inputEl.focus();
  </script>
</body>
</html>
